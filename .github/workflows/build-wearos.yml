name: Build WearOS APK

on:
  push:
    paths:
      - 'AuthenticatorPro.WearOS/**'
      - 'AuthenticatorPro.Droid.Shared/**'
      - 'AuthenticatorPro.Shared/**'
      - '.github/workflows/build-wearos.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Android workload
      run: dotnet workload install android

    - name: Restore
      run: dotnet restore AuthenticatorPro.WearOS/AuthenticatorPro.WearOS.csproj

    - name: Build WearOS (Debug)
      run: dotnet build AuthenticatorPro.WearOS/AuthenticatorPro.WearOS.csproj -c Debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: wearos-apk-debug
        path: AuthenticatorPro.WearOS/bin/Debug/net8.0-android/*.apk

    - name: Build WearOS (Release)
      run: dotnet build AuthenticatorPro.WearOS/AuthenticatorPro.WearOS.csproj -c Release

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: wearos-apk-release
        path: AuthenticatorPro.WearOS/bin/Release/net8.0-android/*.apk
